<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Table Layout Switcher (╯°□°)╯︵┻━┻</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        padding: 16px;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .section {
        border: 1px solid var(--figma-color-border);
        border-radius: 8px;
        padding: 12px;
        background: var(--figma-color-bg-secondary);
      }
      .section-title {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .status {
        font-size: 11px;
        padding: 8px;
        border-radius: 4px;
        background: var(--figma-color-bg-tertiary);
        color: var(--figma-color-text-secondary);
      }
      .status.valid {
        color: var(--figma-color-text-success, #0d9d56);
      }
      .status.error {
        color: var(--figma-color-text-danger, #f24822);
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        background: var(--figma-color-bg-brand);
        color: var(--figma-color-text-onbrand);
      }
      button:hover {
        opacity: 0.9;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="section">
        <div class="section-title">Flip Layout! (╯°□°)╯︵┻━┻</div>
        <div class="status" id="status">Select a table (frame or instance) to see its layout.</div>
        <button id="switchBtn" disabled>Switch to other layout</button>
      </div>
    </div>
    <script>
      const statusEl = document.getElementById("status");
      const switchBtn = document.getElementById("switchBtn");

      function setStatus(kind, rows, cols, error) {
        if (error) {
          statusEl.textContent = error;
          statusEl.className = "status error";
          switchBtn.disabled = true;
          return;
        }
        const label = kind === "column-first" ? `Column-first: ${cols} columns × ${rows} rows` : `Row-first: ${rows} rows × ${cols} columns`;
        // statusEl.textContent = `${label} · ${cols} columns × ${rows} rows`;
        statusEl.textContent = `${label}`;
        statusEl.className = "status valid";
        switchBtn.disabled = false;
        switchBtn.textContent = kind === "column-first" ? "Switch to ▤ Row-first" : "Switch to ▥ Column-first";
      }

      switchBtn.onclick = () => {
        parent.postMessage({ pluginMessage: { type: "switchLayout" } }, "*");
      };

      window.onmessage = (event) => {
        const msg = event.data?.pluginMessage;
        if (!msg || msg.type !== "layoutStatus") return;
        setStatus(msg.kind, msg.rows, msg.cols, msg.error);
      };
    </script>
  </body>
</html>
